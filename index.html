<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhutta Bar 🌽</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Patrick+Hand&family=Quicksand:wght@500&display=swap" rel="stylesheet">

<style>

:root{
  --yellow:#FFD84D;
  --green:#66BB6A;
  --pink:#FFC1D3;
  --blue:#AEE6FF;
  --purple:#D5B6FF;
  --orange:#FFB86C;
}

body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:
    repeating-linear-gradient(
      white,
      white 28px,
      #d7ebff 29px
    );
  overflow-x:hidden;
}

/* Pink margin */
body::before{
  content:"";
  position:fixed;
  left:60px;
  top:0;
  bottom:0;
  width:3px;
  background:#ff8fb1;
  opacity:.7;
}

header{
  text-align:center;
  padding:40px 20px 20px;
}

header h1{
  font-family:'Caveat',cursive;
  font-size:3rem;
  color:var(--green);
  margin:0;
}

.section-title{
  font-family:'Caveat',cursive;
  font-size:2rem;
  margin:50px 0 20px 90px;
  color:var(--yellow);
}

/* Torn Pink Paper Card */
.card{
  width:80%;
  margin:20px auto;
  padding:20px;
  background:var(--pink);
  clip-path:polygon(
    0% 12%, 6% 0%, 94% 0%, 100% 12%,
    100% 88%, 94% 100%, 6% 100%, 0% 88%
  );
  box-shadow:0 8px 15px rgba(0,0,0,0.15);
  position:relative;
  transform:rotate(-1deg);
  transition:.3s;
}

.card:nth-child(even){
  transform:rotate(1deg);
}

.card:hover{
  transform:scale(1.05) rotate(0deg);
}

.price{
  position:absolute;
  right:20px;
  top:20px;
  background:var(--yellow);
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
}

.ingredients{
  font-family:'Patrick Hand',cursive;
  opacity:.8;
}

button{
  background:var(--green);
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  font-family:'Patrick Hand',cursive;
  cursor:pointer;
}

button:active{
  transform:scale(.9);
}

/* Cart */
#cartBtn{
  position:fixed;
  bottom:25px;
  right:25px;
  background:var(--yellow);
  padding:15px;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
}

#cartCount{
  position:absolute;
  top:-5px;
  right:-5px;
  background:var(--green);
  color:white;
  font-size:.7rem;
  padding:4px 6px;
  border-radius:50%;
}

#cartModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:white;
  padding:25px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* Blue Bubbles */
.bubble{
  position:fixed;
  bottom:-20px;
  width:14px;
  height:14px;
  background:rgba(174,230,255,.7);
  border-radius:50%;
  animation:rise 10s linear infinite;
}

@keyframes rise{
  to{transform:translateY(-110vh);}
}

/* Fly animation */
.fly{
  position:fixed;
  font-size:1.5rem;
  pointer-events:none;
  transition:all .8s ease-in-out;
}

/* Confetti */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  animation:fall 2s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(360deg);}
}

</style>
</head>
<body>

<header>
  <h1>Bhutta Bar 🌽</h1>
</header>

<h2 class="section-title">🌽 Corn Creations</h2>
<div id="cornSection"></div>

<h2 class="section-title">🥤 Lime Soda Diaries</h2>
<div id="drinkSection"></div>

<div id="cartBtn" onclick="openCart()">🛒<span id="cartCount">0</span></div>

<div id="cartModal">
  <div class="modal-content">
    <h3>Your Order</h3>
    <div id="cartItems"></div>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="checkout()">Send to WhatsApp</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script>

const cornItems=[
["Classic Butter Corn",40,"Hot sweet corn with butter & salt"],
["Masala Corn",50,"Corn + lemon + chaat masala + onion"],
["Peri Peri Corn",60,"Spicy & tangy peri peri flavor"],
["Cheese Corn",70,"Loaded with melted cheese"],
["Tandoori Corn Cup",70,"Smoky masala roasted style"]
];

const drinkItems=[
["Sweet Lime Soda",30,"Fresh nimbu + sugar + soda"],
["Salted Lime Soda",30,"Salt + lemon + soda"],
["Mint Lime Soda",40,"Minty refreshing twist"],
["Masala Lime Soda",40,"Jeera + black salt + masala"]
];

let cart={};

function createCards(items,section,type){
  items.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="price">₹${item[1]}</div>
      <h3>${item[0]}</h3>
      <div class="ingredients">${item[2]}</div>
      <button onclick="addItem('${item[0]}',${item[1]},'${type}',event)">Add</button>
    `;
    section.appendChild(card);
  });
}

createCards(cornItems,document.getElementById("cornSection"),"corn");
createCards(drinkItems,document.getElementById("drinkSection"),"drink");

function addItem(name,price,type,e){
  if(!cart[name]) cart[name]={price:price,qty:0};
  cart[name].qty++;
  updateCart();
  flyAnimation(type,e);
  popSound();
}

function updateCart(){
  let total=0,count=0,html="";
  for(let item in cart){
    total+=cart[item].price*cart[item].qty;
    count+=cart[item].qty;
    html+=`<p>${item} x${cart[item].qty}</p>`;
  }
  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("cartCount").innerText=count;
}

function flyAnimation(type,e){
  const fly=document.createElement("div");
  fly.className="fly";
  fly.innerText= type==="corn" ? "🌽" : "🥤";
  document.body.appendChild(fly);
  fly.style.left=e.clientX+"px";
  fly.style.top=e.clientY+"px";
  setTimeout(()=>{
    fly.style.left=window.innerWidth-60+"px";
    fly.style.top=window.innerHeight-60+"px";
    fly.style.opacity=0;
  },10);
  setTimeout(()=>fly.remove(),800);
}

function checkout(){
  let message="Hello! I would like to order:%0A";
  for(let item in cart){
    message+=`${item} x${cart[item].qty}%0A`;
  }
  message+=`Total: ₹${document.getElementById("total").innerText}`;
  window.open("https://wa.me/918087532868?text="+message);
  confettiBurst();
}

function confettiBurst(){
  for(let i=0;i<30;i++){
    const conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background=["#FFD84D","#66BB6A","#FFB7C5","#AEE6FF","#D5B6FF","#FFB86C"][Math.floor(Math.random()*6)];
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),2000);
  }
}

function popSound(){
  const audio=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  audio.play();
}

setInterval(()=>{
  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.style.left=Math.random()*100+"vw";
  document.body.appendChild(bubble);
  setTimeout(()=>bubble.remove(),10000);
},1500);

function openCart(){document.getElementById("cartModal").style.display="flex";}
function closeCart(){document.getElementById("cartModal").style.display="none";}

</script>

</body>
</html>
