<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhutta Bar 🌽</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
  --yellow:#FFD84D;
  --green:#6BBF59;
  --pink:#FFB7C5;
  --blue:#CDEBFF;
  --ink:#2b2b2b;
}

/* NOTEBOOK BACKGROUND */
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:
    repeating-linear-gradient(
      white,
      white 28px,
      #cfe7ff 29px
    );
  color:var(--ink);
  overflow-x:hidden;
}

/* LEFT PINK MARGIN LINE */
body::before{
  content:"";
  position:fixed;
  left:60px;
  top:0;
  bottom:0;
  width:3px;
  background:#ff9bb0;
  opacity:.6;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px 20px;
}

header h1{
  font-family:'Caveat',cursive;
  font-size:3rem;
  color:var(--green);
  margin:0;
}

header p{
  font-family:'Patrick Hand',cursive;
  font-size:1.2rem;
  margin:5px 0 0;
}

/* SECTION TITLE */
.section-title{
  font-family:'Caveat',cursive;
  font-size:2.2rem;
  color:var(--yellow);
  margin:60px 0 20px 90px;
}

/* TORN PAPER CARD */
.card{
  position:relative;
  width:80%;
  margin:20px auto;
  padding:20px;
  background:#fffef7;
  transform:rotate(-1deg);
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  clip-path:polygon(
    0% 10%, 5% 0%, 95% 0%, 100% 10%,
    100% 90%, 95% 100%, 5% 100%, 0% 90%
  );
  transition:transform .3s;
}

.card:nth-child(even){
  transform:rotate(1deg);
}

.card:hover{
  transform:scale(1.03) rotate(0deg);
}

.price{
  position:absolute;
  right:20px;
  top:20px;
  background:var(--yellow);
  padding:5px 12px;
  border-radius:20px;
  font-weight:bold;
}

.ingredients{
  font-family:'Patrick Hand',cursive;
  opacity:.7;
  margin:8px 0;
}

button{
  background:var(--green);
  border:none;
  padding:8px 15px;
  border-radius:20px;
  color:white;
  cursor:pointer;
  font-family:'Patrick Hand',cursive;
}

button:active{
  transform:scale(.9);
}

/* CART BUTTON */
#cartBtn{
  position:fixed;
  bottom:25px;
  right:25px;
  background:var(--yellow);
  padding:15px;
  border-radius:50%;
  font-size:1.5rem;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#cartCount{
  position:absolute;
  top:-5px;
  right:-5px;
  background:var(--green);
  color:white;
  font-size:.7rem;
  padding:4px 6px;
  border-radius:50%;
}

/* CART MODAL */
#cartModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#fffef7;
  padding:30px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

/* BUBBLES */
.bubble{
  position:fixed;
  bottom:-20px;
  width:12px;
  height:12px;
  background:rgba(107,191,89,.4);
  border-radius:50%;
  animation:rise 10s infinite linear;
}

@keyframes rise{
  from{transform:translateY(0);}
  to{transform:translateY(-110vh);}
}

/* FLY ITEM */
.fly{
  position:fixed;
  font-size:1.2rem;
  pointer-events:none;
  transition:all .8s ease-in-out;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  background:var(--pink);
  animation:fall 2s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(360deg);}
}

</style>
</head>
<body>

<header>
  <h1>Bhutta Bar 🌽</h1>
  <p>butter, fizz & cute vibes</p>
</header>

<h2 class="section-title">Corn ♥ Creations</h2>

<div id="menu"></div>

<div id="cartBtn" onclick="openCart()">🛒<span id="cartCount">0</span></div>

<div id="cartModal">
  <div class="modal-content">
    <h3>Your Order</h3>
    <div id="cartItems"></div>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="checkout()">Send to WhatsApp</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script>

/* MENU DATA */
const items=[
["Classic Butter Corn",40,"Hot sweet corn with butter & salt"],
["Masala Corn",50,"Corn + lemon + chaat masala + onion"],
["Peri Peri Corn",60,"Spicy & tangy peri peri flavor"],
["Cheese Corn",70,"Loaded with melted cheese"],
["Tandoori Corn Cup",70,"Smoky masala roasted style"],
["Sweet Lime Soda",30,"Fresh nimbu + sugar + soda"],
["Salted Lime Soda",30,"Salt + lemon + soda"],
["Mint Lime Soda",40,"Minty refreshing twist"],
["Masala Lime Soda",40,"Jeera + black salt + masala"],
["Corn + Lime Soda Combo",70,"Any classic corn + any lime soda"],
["Cheese Corn + Mint Lime Soda",100,"Best seller combo"]
];

let cart={};

const menuDiv=document.getElementById("menu");

items.forEach(item=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="price">₹${item[1]}</div>
    <h3>${item[0]}</h3>
    <div class="ingredients">${item[2]}</div>
    <button onclick="addItem('${item[0]}',${item[1]},event)">Add</button>
  `;
  menuDiv.appendChild(card);
});

function addItem(name,price,e){
  if(!cart[name]) cart[name]={price:price,qty:0};
  cart[name].qty++;
  updateCart();
  flyAnimation(e);
  popSound();
}

function updateCart(){
  let total=0;
  let html="";
  let count=0;
  for(let item in cart){
    total+=cart[item].price*cart[item].qty;
    count+=cart[item].qty;
    html+=`
      <p>${item} x${cart[item].qty}
      <button onclick="changeQty('${item}',-1)">-</button>
      <button onclick="changeQty('${item}',1)">+</button>
      </p>`;
  }
  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("cartCount").innerText=count;
}

function changeQty(name,val){
  cart[name].qty+=val;
  if(cart[name].qty<=0) delete cart[name];
  updateCart();
}

function openCart(){
  document.getElementById("cartModal").style.display="flex";
}

function closeCart(){
  document.getElementById("cartModal").style.display="none";
}

function checkout(){
  let message="Hello! I would like to order:%0A";
  for(let item in cart){
    message+=`${item} x${cart[item].qty}%0A`;
  }
  message+=`Total: ₹${document.getElementById("total").innerText}`;
  window.open("https://wa.me/91YOURNUMBER?text="+message);
  confettiBurst();
}

/* FLY ANIMATION */
function flyAnimation(e){
  const fly=document.createElement("div");
  fly.className="fly";
  fly.innerText="🌽";
  document.body.appendChild(fly);
  fly.style.left=e.clientX+"px";
  fly.style.top=e.clientY+"px";
  setTimeout(()=>{
    fly.style.left=window.innerWidth-60+"px";
    fly.style.top=window.innerHeight-60+"px";
    fly.style.opacity=0;
  },10);
  setTimeout(()=>fly.remove(),800);
}

/* CONFETTI */
function confettiBurst(){
  for(let i=0;i<30;i++){
    const conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background=["#FFD84D","#6BBF59","#FFB7C5"][Math.floor(Math.random()*3)];
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),2000);
  }
}

/* SOUND */
function popSound(){
  const audio=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  audio.play();
}

/* BUBBLES */
setInterval(()=>{
  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.style.left=Math.random()*100+"vw";
  document.body.appendChild(bubble);
  setTimeout(()=>bubble.remove(),10000);
},1500);

</script>

</body>
</html>
