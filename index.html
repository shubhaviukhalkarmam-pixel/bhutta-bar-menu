<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhutta Bar 🌽</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#fdf6ec;
  --text:#2b2b2b;
  --accent:#d97706;
  --card:#fffaf3;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#111;
    --text:#f4f4f4;
    --accent:#ffb703;
    --card:#1b1b1b;
  }
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  cursor:url('https://cur.cursors-4u.net/food/foo-1/foo76.cur'),auto;
}

header{
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.6);
  padding:15px;
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:28px;
  z-index:1000;
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.4s;
  position:relative;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  border-radius:15px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.price{
  color:var(--accent);
  font-weight:600;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{opacity:0.6;}
  to{text-shadow:0 0 10px var(--accent);}
}

button{
  background:var(--accent);
  border:none;
  padding:10px 20px;
  color:white;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  padding:15px 20px;
  border-radius:50px;
  font-weight:bold;
}

.bubbles{
  position:fixed;
  bottom:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
}

.bubbles span{
  position:absolute;
  bottom:-50px;
  width:15px;
  height:15px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:rise 10s linear infinite;
}

@keyframes rise{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100vh);}
}

</style>
</head>
<body>

<header>Bhutta Bar 🌽</header>

<section class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-402b7f6c1b2f" alt="">
<h3>Masala Bhutta</h3>
<p class="price">₹40</p>
<button onclick="addToCart('Masala Bhutta',40)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1590080876098-1a89e2b1f6d7" alt="">
<h3>Cheese Bhutta</h3>
<p class="price">₹60</p>
<button onclick="addToCart('Cheese Bhutta',60)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1605478039269-efb5bfe5c5d7" alt="">
<h3>Lemon Soda</h3>
<p class="price">₹50</p>
<button onclick="addToCart('Lemon Soda',50)">Add</button>
</div>

</section>

<button class="cart-btn" onclick="checkout()">Order on WhatsApp 🛒</button>

<div class="bubbles">
<span style="left:10%; animation-delay:0s;"></span>
<span style="left:30%; animation-delay:2s;"></span>
<span style="left:60%; animation-delay:4s;"></span>
<span style="left:80%; animation-delay:1s;"></span>
</div>

<audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

let cart=[];

function addToCart(item,price){
  cart.push({item,price});
  document.getElementById("popSound").play();
  alert(item+" added to cart 🌽");
}

function checkout(){
  if(cart.length===0){
    alert("Cart empty!");
    return;
  }

  let message="Hello Bhutta Bar 🌽%0AOrder Details:%0A";
  let total=0;

  cart.forEach(c=>{
    message+="• "+c.item+" - ₹"+c.price+"%0A";
    total+=c.price;
  });

  message+="%0ATotal: ₹"+total;

  window.open("https://wa.me/91YOURNUMBER?text="+message);
}

</script>

</body>
</html>
